name: ETL Automatisé — L'Oracle des Plumes

on:
  schedule:
    - cron: '0 8 1,15 * *'  # Je lance le 1er et 15 de chaque mois à 8h
  workflow_dispatch:  # Je permets aussi le lancement manuel

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement ETL
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          HARDCOVER_API_KEY: ${{ secrets.HARDCOVER_API_KEY }}
        run: python -m scripts.etl_auto